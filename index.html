<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="snowme34 - Personal blog">
    <title>Home - snowme34</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="css/styles.min.css">
    <style>
        :root {
            --bg-image: url('../images/background.jpg');
            --bg-position: left bottom;
            --bg-overlay: rgba(0, 0, 0, 0.3);
            --card-bg: rgba(241, 196, 199, 0.445);
            --card-blur: 20px;
            --primary-color: #333;
            --text-color: #333;
            --link-hover: #666;
            --button-bg: rgba(245, 207, 207, 0.2);
            --button-hover: rgba(245, 207, 207, 0.35);
        }
    </style>
    <script>
        window.particleConfig = {
            particleCount: 100,
            maxSize: 4,
            minSize: 1,
            maxSpeed: 1.5,
            minSpeed: 0.3,
            cursorRadius: 150,
            lightIntensity: 0.8,
            color: 'rgba(255, 255, 255, 0.8)',
            baseSpeed: 1.0
        };
    </script>
</head>
<body>
    <canvas id="particles"></canvas>

    <main class="card">
        <img src="images/profile.jpg" alt="Profile photo" class="profile-photo">
        <h1 class="name">snowme34</h1>
        <p class="bio">Dreaming of sugar snow.</p>

        <nav class="navigation">
            <a href="https://blog.snowme34.com" class="nav-button">Blog</a>
            <a href="https://docs.snowme34.com" class="nav-button">Docs</a>
            <a href="https://projects.snowme34.com" class="nav-button">Projects</a>
            <a href="https://cook.snowme34.com" class="nav-button">Cook</a>
        </nav>

        <div class="social-icons">
            <a href="https://x.com/snowme34" aria-label="X (Twitter)" class="social-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4l11.733 16h4.267l-11.733 -16z"></path>
                    <path d="M4 20l6.768 -6.768m2.46 -2.46l6.772 -6.772"></path>
                </svg>
            </a>
            <a href="https://instagram.com/snowme34" aria-label="Instagram" class="social-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                    <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                    <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                </svg>
            </a>
            <a href="https://github.com/snowme34" aria-label="GitHub" class="social-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
                </svg>
            </a>
        </div>
    </main>

    <script src="js/particles.min.js"></script>
</body>
</html>
